name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install web dependencies
        run: npm install
      - name: Build web app
        run: npm run build
      - name: Install Capacitor
        run: npm install --no-save @capacitor/core @capacitor/cli @capacitor/android
      - name: Create Android project
        shell: bash
        run: |
          if [ -d .output/public ]; then WEB_DIR=.output/public; elif [ -d dist ]; then WEB_DIR=dist; else echo 'Web build output was not found.'; exit 1; fi
          cat > capacitor.config.ts <<EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = { appId: 'app.lovable.kiahfocus', appName: 'Kiah Focus', webDir: '$WEB_DIR' };
          export default config;
          EOF
          npx cap add android
          npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: kiah-focus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
