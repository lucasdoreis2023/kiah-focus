name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Create Capacitor wrapper
        shell: bash
        run: |
          mkdir android-wrapper
          cd android-wrapper
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir web
          printf '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kiah</title></head><body></body></html>' > web/index.html
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.konectai.kiah',
            appName: 'Kiah',
            webDir: 'web',
            server: {
              url: 'https://focus.konecta-i.com',
              cleartext: false,
              allowNavigation: ['focus.konecta-i.com'],
            },
          };

          export default config;
          EOF
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: android-wrapper/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kiah-android-apk
          path: android-wrapper/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
